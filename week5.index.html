<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>学校のトップページ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-indigo-700 text-white px-6 py-4">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center">
      <h1 class="text-xl font-bold"> POSSE </h1>
      <!-- TODO: ナビゲーションを追加 -->
      <nav class="flex flex-wrap gap-4 text-sm">
        <a href="#" class="hover:text-red-200 transition">ホーム</a>
        <a href="#" class="hover:text-red-200 transition">特徴</a>
        <a href="#" class="hover:text-red-200 transition">歴史</a>
        <a href="#" class="hover:text-red-200 transition">校歌</a>
      </nav>
    </div>
    </header>
    
    <section class="bg-emerald-50 py-16 px-4 text-center border-b border-gray-200">
    <div class="max-w-3xl mx-auto">
      <span class="text-emerald-700 font-bold tracking-widest text-sm uppercase block mb-2">2026年度 新入生募集中</span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 leading-tight mb-4">
        豊かな学園生活を我が校で
      </h2>

      <a href="#" class="inline-block bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-3 rounded-md shadow transition">
        資料請求はこちら
      </a>
    </div>
    </section>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <h3 class="text-2xl font-bold text-center text-gray-900 mb-8 border-b-4 border-emerald-500 w-fit mx-auto pb-2">
      本学の3つの特徴
    </h3>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-100 flex flex-col justify-between">
        <div class="p-6">
          <div class="text-emerald-600 font-bold mb-2 text-sm">特徴</div>
          <h4 class="text-lg font-bold mb-3 text-gray-900">英語、第二外国語を学ぶ環境</h4>
          <p class="text-gray-600 text-sm leading-relaxed">
            ネイティブ講師による指導と、短期・長期留学プログラムが充実。
          </p>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-100 flex flex-col justify-between">
        <div class="p-6">
          <div class="text-emerald-600 font-bold mb-2 text-sm">歴史</div>
          <h4 class="text-lg font-bold mb-3 text-gray-900">伝統を未来へ</h4>
          <p class="text-gray-600 text-sm leading-relaxed">先人に培われてきた、歴史ある学び舎で成長できる環境
           
          </p>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-100 flex flex-col justify-between">
        <div class="p-6">
          <div class="text-emerald-600 font-bold mb-2 text-sm">校歌</div>
          <h4 class="text-lg font-bold mb-3 text-gray-900">有名作曲家が手掛けた一曲</h4>
          <p class="text-gray-600 text-sm leading-relaxed">
            伝統ある学校にふさわしい、全国的にも有名な校歌
          </p>
        </div>
        
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 text-center text-xs py-8 px-4 border-t border-gray-800">POSSE</footer>

</body>
</html>
