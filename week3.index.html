<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3人の自己紹介</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center py-12 px-4">

  <div class="w-full max-w-5xl mx-auto">

    <div class="flex flex-col md:flex-row gap-8 justify-between">
      
      <div class="flex-1 bg-white rounded-2xl shadow-sm p-6 flex flex-col items-center text-center">
        <span class="text-5xl mb-4 block ">🐶</span>
        <h2 class="text-xl font-bold text-slate-900 mb-2">だいち</h2>
        <p class="text-emerald-600 text-xs font-semibold uppercase tracking-wider mb-3">サッカー部</p>
        <p class="text-slate-600 text-sm leading-relaxed">
          幅広い視野を持つ心優しいMF。お茶目な一面あり。
        </p>
      </div>

      <div class="flex-1 bg-white rounded-2xl shadow-sm p-6 flex flex-col items-center text-center">
        <span class="text-5xl mb-4 block">😸</span>
        <h2 class="text-xl font-bold text-slate-900 mb-2">ゆうき</h2>
        <p class="text-blue-600 text-xs font-semibold uppercase tracking-wider mb-3">先生の卵</p>
        <p class="text-slate-600 text-sm leading-relaxed">
          お父さんも学校の先生。ガストでバイト。
        </p>
      </div>

      <div class="flex-1 bg-white rounded-2xl shadow-sm p-6 flex flex-col items-center text-center">
        <span class="text-5xl mb-4 block">🦁</span>
        <h2 class="text-xl font-bold text-slate-900 mb-2">りん</h2>
        <p class="text-amber-600 text-xs font-semibold uppercase tracking-wider mb-3">バスケ部</p>
        <p class="text-slate-600 text-sm leading-relaxed">
          全国大会もでた天才。彼女を溺愛。
        </p>
      </div>

    </div>

  </div>

</body>
</html>
